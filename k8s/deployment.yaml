apiVersion: v1
kind: Service
metadata:
  name: transaction-service
spec:
  selector:
    app: transaction-service
  ports:
    - protocol: TCP
      port: 3004
      targetPort: 3004
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transaction-service
  template:
    metadata:
      labels:
        app: transaction-service
    spec:
      containers:
        - name: transaction-service
          image: vaultrix-transaction-service:latest
          ports:
            - containerPort: 3004
          env:
            - name: PORT
              value: "3004"
            - name: MONGO_URI
              value: "mongodb://transaction-db:27017/transaction_db"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:3002"
            - name: USER_SERVICE_URL
              value: "http://user-service:3001"
            - name: WALLET_SERVICE_URL
              value: "http://wallet-service:3003"
---
