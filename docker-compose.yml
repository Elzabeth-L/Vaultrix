services:
  # ── Databases ────────────────────────────────────────────────────────────────

  users-db:
    image: mongo:6
    container_name: vaultrix-users-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - users_data:/data/db

  orders-db:
    image: mongo:6
    container_name: vaultrix-orders-db
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - orders_data:/data/db

  wallet-db:
    image: mongo:6
    container_name: vaultrix-wallet-db
    restart: unless-stopped
    ports:
      - "27019:27017"
    volumes:
      - wallet_data:/data/db

  transaction-db:
    image: mongo:6
    container_name: vaultrix-transaction-db
    restart: unless-stopped
    ports:
      - "27020:27017"
    volumes:
      - transaction_data:/data/db

  ledger-db:
    image: mongo:6
    container_name: vaultrix-ledger-db
    restart: unless-stopped
    ports:
      - "27021:27017"
    volumes:
      - ledger_data:/data/db

  booking-db:
    image: mongo:6
    container_name: vaultrix-booking-db
    restart: unless-stopped
    ports:
      - "27022:27017"
    volumes:
      - booking_data:/data/db

  marketplace-db:
    image: mongo:6
    container_name: vaultrix-marketplace-db
    restart: unless-stopped
    ports:
      - "27023:27017"
    volumes:
      - marketplace_data:/data/db

  # ── Microservices ─────────────────────────────────────────────────────────────

  user-service:
    build: ./src/user-service
    container_name: vaultrix-user-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://users-db:27017/users_db
      - JWT_SECRET=vaultrix-super-secret-key
      - WALLET_SERVICE_URL=http://wallet-service:3003
    depends_on:
      - users-db

  order-service:
    build: ./src/order-service
    container_name: vaultrix-order-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - MONGO_URI=mongodb://orders-db:27017/orders_db
    depends_on:
      - orders-db

  wallet-service:
    build: ./src/wallet-service
    container_name: vaultrix-wallet-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - MONGO_URI=mongodb://wallet-db:27017/wallet_db
    depends_on:
      - wallet-db

  transaction-service:
    build: ./src/transaction-service
    container_name: vaultrix-transaction-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - MONGO_URI=mongodb://transaction-db:27017/transaction_db
      - ORDER_SERVICE_URL=http://order-service:3002
      - USER_SERVICE_URL=http://user-service:3001
      - WALLET_SERVICE_URL=http://wallet-service:3003
      - LEDGER_SERVICE_URL=http://ledger-service:3005
    depends_on:
      - transaction-db
      - order-service
      - user-service
      - wallet-service
      - ledger-service

  ledger-service:
    build: ./src/ledger-service
    container_name: vaultrix-ledger-service
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - MONGO_URI=mongodb://ledger-db:27017/ledger_db
    depends_on:
      - ledger-db

  booking-service:
    build: ./src/booking-service
    container_name: vaultrix-booking-service
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
      - MONGO_URI=mongodb://booking-db:27017/booking_db
    depends_on:
      - booking-db

  marketplace-service:
    build: ./src/marketplace-service
    container_name: vaultrix-marketplace-service
    restart: unless-stopped
    ports:
      - "3007:3007"
    environment:
      - PORT=3007
      - MONGO_URI=mongodb://marketplace-db:27017/marketplace_db
    depends_on:
      - marketplace-db

  api-gateway:
    build: ./src/api-gateway
    container_name: vaultrix-api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - USER_SERVICE_URL=http://user-service:3001
      - ORDER_SERVICE_URL=http://order-service:3002
      - WALLET_SERVICE_URL=http://wallet-service:3003
      - TRANSACTION_SERVICE_URL=http://transaction-service:3004
      - LEDGER_SERVICE_URL=http://ledger-service:3005
      - BOOKING_SERVICE_URL=http://booking-service:3006
      - MARKETPLACE_SERVICE_URL=http://marketplace-service:3007
    depends_on:
      - user-service
      - order-service
      - wallet-service
      - transaction-service
      - ledger-service
      - booking-service
      - marketplace-service

  frontend:
    build: ./frontend
    container_name: vaultrix-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api-gateway

# ── Volumes ───────────────────────────────────────────────────────────────────

volumes:
  users_data:
  orders_data:
  wallet_data:
  transaction_data:
  ledger_data:
  booking_data:
  marketplace_data:
