services:
  users-db:
    image: mongo:6
    container_name: vaultrix-users-db
    restart: unless-stopped
    volumes:
      - users_data:/data/db

  orders-db:
    image: mongo:6
    container_name: vaultrix-orders-db
    restart: unless-stopped
    volumes:
      - orders_data:/data/db

  wallet-db:
    image: mongo:6
    container_name: vaultrix-wallet-db
    restart: unless-stopped
    volumes:
      - wallet_data:/data/db

  invoice-db:
    image: mongo:6
    container_name: vaultrix-invoice-db
    restart: unless-stopped
    volumes:
      - invoice_data:/data/db

  review-db:
    image: mongo:6
    container_name: vaultrix-review-db
    restart: unless-stopped
    volumes:
      - review_data:/data/db

  user-service:
    build: ./src/user-service
    container_name: vaultrix-user-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://users-db:27017/users_db
      - JWT_SECRET=vaultrix-super-secret-key
      - WALLET_SERVICE_URL=http://wallet-service:3003
      - INTERNAL_SERVICE_TOKEN=vaultrix-internal-token
    depends_on:
      - users-db

  order-service:
    build: ./src/order-service
    container_name: vaultrix-order-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - MONGO_URI=mongodb://orders-db:27017/orders_db
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
      - USER_SERVICE_URL=http://user-service:3001
      - INTERNAL_SERVICE_TOKEN=vaultrix-internal-token
    depends_on:
      - orders-db
      - notification-service

  wallet-service:
    build: ./src/wallet-service
    container_name: vaultrix-wallet-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - MONGO_URI=mongodb://wallet-db:27017/wallet_db
      - ORDER_SERVICE_URL=http://order-service:3002
      - INVOICE_SERVICE_URL=http://invoice-service:3005
    depends_on:
      - wallet-db
      - order-service
      - invoice-service

  invoice-service:
    build: ./src/invoice-service
    container_name: vaultrix-invoice-service
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - MONGO_URI=mongodb://invoice-db:27017/invoice_db
      - ORDER_SERVICE_URL=http://order-service:3002
    depends_on:
      - invoice-db
      - order-service

  review-service:
    build: ./src/review-service
    container_name: vaultrix-review-service
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
      - MONGO_URI=mongodb://review-db:27017/review_db
      - ORDER_SERVICE_URL=http://order-service:3002
    depends_on:
      - review-db
      - order-service

  notification-service:
    build: ./src/notification-service
    container_name: vaultrix-notification-service
    restart: unless-stopped
    ports:
      - "3007:3007"
    env_file:
      - ./src/notification-service/.env

  api-gateway:
    build: ./src/api-gateway
    container_name: vaultrix-api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - USER_SERVICE_URL=http://user-service:3001
      - ORDER_SERVICE_URL=http://order-service:3002
      - WALLET_SERVICE_URL=http://wallet-service:3003
      - INVOICE_SERVICE_URL=http://invoice-service:3005
      - REVIEW_SERVICE_URL=http://review-service:3006
    depends_on:
      - user-service
      - order-service
      - wallet-service
      - invoice-service
      - review-service

  frontend:
    build: ./frontend
    container_name: vaultrix-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api-gateway

volumes:
  users_data:
  orders_data:
  wallet_data:
  invoice_data:
  review_data:
